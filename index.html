<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pernikahan Dalam Islam — SMA Kelas XI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Scheherazade+New:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   TOKEN SYSTEM
══════════════════════════════════ */
:root {
  --navy:       #0D1B2A;
  --navy-mid:   #1A3049;
  --navy-soft:  #243B55;
  --gold:       #D4A843;
  --gold-light: #EAC96A;
  --gold-pale:  #FBF3DC;
  --sage:       #4A7C59;
  --sage-light: #6A9E78;
  --sage-soft:  #EBF4EE;
  --ivory:      #F8F4EC;
  --ivory-dark: #EDE8DB;
  --ink:        #1A1A1A;
  --ink-mid:    #3A3A3A;
  --muted:      #6B7280;
  --white:      #FFFFFF;
  --border:     rgba(212,168,67,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(145deg, #050D14 0%, #0D1B2A 50%, #091320 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 16px 40px;
}

/* ══════════════════════════════════
   TOOLBAR
══════════════════════════════════ */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 800px;
}

.toolbar-brand {
  font-family: 'Playfair Display', serif;
  color: var(--gold-light);
  font-size: 15px;
  letter-spacing: 0.5px;
  margin-right: 6px;
}

.nav-btn {
  background: rgba(212,168,67,0.1);
  border: 1px solid rgba(212,168,67,0.35);
  color: var(--gold-light);
  padding: 7px 16px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  transition: all 0.2s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(212,168,67,0.22);
  border-color: var(--gold);
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.page-counter {
  color: rgba(234,201,106,0.6);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  min-width: 100px;
  text-align: center;
}

.progress-wrap {
  width: 100%;
  max-width: 500px;
  height: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ══════════════════════════════════
   BOOK
══════════════════════════════════ */
.book-scene {
  perspective: 2400px;
  width: min(720px, 96vw);
}

.book-wrap {
  position: relative;
  width: 100%;
  padding-top: 141.4%; /* A4 ratio */
}

.book-glow {
  position: absolute;
  top: 10%; bottom: 10%; left: -10%; right: -10%;
  background: radial-gradient(ellipse, rgba(212,168,67,0.08) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

.page-flipper {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  transform-style: preserve-3d;
  transition: transform 0.72s cubic-bezier(0.645, 0.045, 0.355, 1.000);
  transform-origin: left center;
  z-index: 1;
}

.page-face {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  backface-visibility: hidden;
  overflow: hidden;
  border-radius: 1px 6px 6px 1px;
  box-shadow:
    3px 0 20px rgba(0,0,0,0.5),
    inset -1px 0 0 rgba(0,0,0,0.15),
    0 0 0 1px rgba(212,168,67,0.1);
  background: var(--ivory);
}

.page-back-face {
  transform: rotateY(180deg);
  border-radius: 6px 1px 1px 6px;
  box-shadow:
    -3px 0 20px rgba(0,0,0,0.5),
    inset 1px 0 0 rgba(0,0,0,0.1),
    0 0 0 1px rgba(212,168,67,0.1);
}

.page-flipper.flipped { transform: rotateY(-180deg); }

/* Spine shadow */
.page-face::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 24px; height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
  z-index: 10;
  pointer-events: none;
}
.page-back-face::before {
  left: auto; right: 0;
  background: linear-gradient(to left, rgba(0,0,0,0.1), transparent);
}

/* Corner peel */
.page-face::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 0 32px 32px;
  border-color: transparent transparent var(--ivory-dark) transparent;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.page-flipper:not(.flipped) .page-face::after { opacity: 0.6; }

.page-scroll {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overscroll-behavior: contain;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-pale) transparent;
}
.page-scroll::-webkit-scrollbar { width: 3px; }
.page-scroll::-webkit-scrollbar-thumb { background: var(--gold-pale); border-radius: 3px; }

/* ══════════════════════════════════
   ISLAMIC GEOMETRIC ORNAMENT (CSS only)
══════════════════════════════════ */
.geo-border {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
}
.geo-border svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.18;
}

/* ══════════════════════════════════
   PAGE NUMBER FOOTER
══════════════════════════════════ */
.page-num-footer {
  position: absolute;
  bottom: 14px;
  left: 0; right: 0;
  text-align: center;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--muted);
  z-index: 5;
  text-transform: uppercase;
}


/* ══ NEW PHOTO COVER ══ */
.cv-wrap {
  width:100%;height:100%;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  text-align:center;
}
.cv-photo {
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;object-position:center 20%;
  z-index:0;
}
.cv-overlay {
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.0) 0%,
    rgba(0,0,0,0.15) 30%,
    rgba(13,27,42,0.75) 60%,
    rgba(7,15,26,0.97) 100%
  );
  z-index:1;
}
.cv-content {
  position:relative;z-index:2;
  width:100%;padding:0 28px 32px;
}
.cv-arabic-top {
  position:absolute;top:0;left:0;right:0;z-index:2;
  padding:18px 24px 0;
  text-align:center;
}
.cv-arabic-top-text {
  font-family:'Scheherazade New',serif;
  font-size:clamp(14px,3vw,20px);
  color:rgba(234,201,106,0.85);
  text-shadow:0 2px 8px rgba(0,0,0,0.6);
  line-height:1.6;
}
.cv-badge-top {
  font-size:9px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;
  color:var(--sage-light);
  margin-bottom:6px;
  text-shadow:0 1px 6px rgba(0,0,0,0.5);
}
.cv-line {
  width:50px;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:8px auto;
}
.cv-main-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,5.5vw,44px);
  color:#fff;font-weight:700;
  line-height:1.15;letter-spacing:-.5px;
  text-shadow:0 3px 16px rgba(0,0,0,0.7);
  margin-bottom:4px;
}
.cv-main-title em { color:var(--gold-light); font-style:italic; }
.cv-sub-title {
  font-size:10.5px;color:rgba(255,255,255,0.5);
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:14px;font-weight:300;
}
.cv-tags-row {
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  margin-bottom:0;
}
.cv-tag-pill {
  border:1px solid rgba(212,168,67,0.35);
  color:rgba(234,201,106,0.75);
  font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;
  padding:4px 11px;border-radius:20px;
  font-weight:600;
  background:rgba(0,0,0,0.25);
}
.cv-group-box {
  background:rgba(13,27,42,0.7);
  border:1px solid rgba(212,168,67,0.2);
  border-radius:6px;
  padding:10px 16px;
  margin:12px 0 0;
  font-size:10px;color:rgba(255,255,255,0.55);
  line-height:2;letter-spacing:.3px;
  backdrop-filter:blur(4px);
}
.cv-group-box strong { color:var(--gold-light); font-weight:600; }

/* ══════════════════════════════════
   INNER PAGE LAYOUT
══════════════════════════════════ */
.pg {
  padding: 42px 44px 40px;
  min-height: 100%;
  background: var(--ivory);
  position: relative;
}

/* Chapter intro pages */
.pg-chapter {
  background: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 100%;
  padding: 50px 44px;
}
.pg-chapter .ch-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 5px;
  color: var(--sage-light);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.pg-chapter .ch-num {
  font-family: 'Playfair Display', serif;
  font-size: clamp(60px, 12vw, 90px);
  color: rgba(212,168,67,0.12);
  font-weight: 700;
  line-height: 1;
  margin-bottom: 0px;
}
.pg-chapter .ch-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 4vw, 34px);
  color: var(--white);
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 16px;
}
.pg-chapter .ch-arabic {
  font-family: 'Scheherazade New', serif;
  font-size: 26px;
  color: var(--gold-light);
  margin-bottom: 20px;
  opacity: 0.85;
}
.pg-chapter .ch-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  line-height: 1.7;
  max-width: 380px;
  letter-spacing: 0.3px;
}
.ch-divider {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin: 18px auto;
  opacity: 0.6;
}

/* ── Heading levels ── */
.h-section {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--navy);
  font-weight: 700;
  margin: 28px 0 12px;
  line-height: 1.3;
  position: relative;
  padding-left: 18px;
}
.h-section::before {
  content: '';
  position: absolute;
  left: 0; top: 4px;
  width: 4px;
  height: calc(100% - 4px);
  background: linear-gradient(to bottom, var(--gold), var(--sage));
  border-radius: 2px;
}
.h-sub {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--sage);
  font-weight: 600;
  margin: 20px 0 8px;
}

/* ── Body text ── */
.txt {
  font-size: 14px;
  color: var(--ink-mid);
  line-height: 1.85;
  margin-bottom: 12px;
}

/* ── Ayat box ── */
.ayat {
  background: var(--navy);
  border-radius: 6px;
  padding: 26px 28px;
  margin: 20px 0;
  position: relative;
  overflow: hidden;
}
.ayat::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--sage-light));
}
.ayat-ar {
  font-family: 'Scheherazade New', serif;
  font-size: 22px;
  color: var(--gold-light);
  text-align: center;
  direction: rtl;
  line-height: 1.9;
  margin-bottom: 12px;
}
.ayat-tr {
  font-size: 12.5px;
  color: rgba(255,255,255,0.65);
  font-style: italic;
  line-height: 1.7;
  text-align: center;
}
.ayat-src {
  text-align: center;
  margin-top: 8px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
}

/* ── Hadis box ── */
.hadis {
  background: var(--gold-pale);
  border-left: 3px solid var(--gold);
  padding: 18px 22px;
  margin: 18px 0;
  border-radius: 0 6px 6px 0;
}
.hadis-txt {
  font-family: 'Amiri', serif;
  font-size: 15.5px;
  font-style: italic;
  color: var(--navy);
  line-height: 1.9;
  margin-bottom: 6px;
}
.hadis-src {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* ── Info cards ── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
  margin: 18px 0;
}
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 14px;
  position: relative;
  overflow: hidden;
}
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 13.5px;
  color: var(--navy);
  font-weight: 700;
  margin-bottom: 6px;
}
.card-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: var(--gold-pale);
  color: var(--sage);
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 8px;
}
.card-txt {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

/* ── Numbered list ── */
.nlist { list-style: none; margin: 14px 0; }
.nlist li {
  display: flex;
  gap: 14px;
  margin-bottom: 12px;
  align-items: flex-start;
}
.nbadge {
  min-width: 26px; height: 26px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.nlist li .txt { margin: 0; }

/* ── Alpha list ── */
.alist { list-style: none; margin: 12px 0; }
.alist li {
  display: flex;
  gap: 12px;
  margin-bottom: 9px;
  font-size: 13.5px;
  color: var(--ink-mid);
  line-height: 1.65;
}
.abadge {
  min-width: 22px; height: 22px;
  background: var(--gold-pale);
  color: var(--sage);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── Highlight box ── */
.hl {
  background: var(--sage-soft);
  border: 1px solid rgba(74,124,89,0.2);
  border-radius: 6px;
  padding: 18px 20px;
  margin: 16px 0;
}
.hl-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  color: var(--sage);
  font-weight: 700;
  margin-bottom: 7px;
}
.hl .txt { font-size: 13px; margin: 0; }

/* ── Key term ── */
.term {
  display: inline;
  background: var(--gold-pale);
  border-radius: 3px;
  padding: 0 5px;
  font-weight: 600;
  color: var(--navy-mid);
  font-size: 0.95em;
}

/* ── Definition table ── */
.def-table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
.def-table th {
  background: var(--navy);
  color: var(--gold-light);
  padding: 9px 14px;
  text-align: left;
  font-family: 'Inter', sans-serif;
  font-size: 10.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
}
.def-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--ink-mid); vertical-align: top; line-height: 1.55; }
.def-table tr:last-child td { border-bottom: none; }
.def-table tr:nth-child(even) td { background: rgba(212,168,67,0.04); }

/* ── TOC ── */
.toc-wrap {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 26px 28px;
  margin: 8px 0;
}
.toc-head {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--navy);
  font-weight: 700;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.toc-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 7px 0;
  border-bottom: 1px dashed rgba(212,168,67,0.2);
  gap: 12px;
}
.toc-item:last-child { border-bottom: none; }
.toc-left { display: flex; gap: 10px; align-items: baseline; }
.toc-n { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 1px; min-width: 22px; }
.toc-t { font-size: 13px; color: var(--navy-mid); }
.toc-p { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; white-space: nowrap; }
.toc-section {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sage);
  margin: 14px 0 6px;
}

/* ── Page header band ── */
.pg-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 26px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.pg-chap-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
}
.pg-title {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  color: var(--navy);
  font-weight: 700;
}

/* ── Closing / back cover ── */
.closing-pg {
  background: linear-gradient(165deg, var(--navy) 0%, #071820 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 100%;
  padding: 60px 44px;
}
.closing-arabic {
  font-family: 'Scheherazade New', serif;
  font-size: 32px;
  color: var(--gold-light);
  margin-bottom: 24px;
  line-height: 1.7;
}
.closing-rule { width: 60px; height: 1px; background: var(--gold); margin: 20px auto; opacity: 0.6; }
.closing-h { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--white); margin-bottom: 14px; }
.closing-p { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.8; max-width: 400px; }

/* ══════════════════════════════════
   QUIZ STYLES
══════════════════════════════════ */
.qz-header {
  background: var(--navy);
  color: var(--white);
  padding: 22px 26px;
  margin: -42px -44px 26px;
  position: relative;
}
.qz-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--sage-light));
}
.qz-header-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--sage-light);
  margin-bottom: 4px;
}
.qz-header-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
}
.qz-instr {
  background: var(--sage-soft);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 12.5px;
  color: var(--sage);
  line-height: 1.6;
  border-left: 3px solid var(--sage);
}
.q-block {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 18px 18px 14px;
  margin-bottom: 16px;
}
.q-num {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}
.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 14.5px;
  color: var(--navy);
  margin-bottom: 14px;
  line-height: 1.5;
}
.q-opts { list-style: none; }
.q-opts li { margin-bottom: 7px; }
.q-opts input[type=radio] { display: none; }
.q-opts label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 12px;
  border: 1.5px solid #E5E0D3;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--ink-mid);
  transition: all 0.15s;
  line-height: 1.45;
}
.q-opts label:hover { border-color: var(--gold); background: var(--gold-pale); }
.q-opts input[type=radio]:checked + label {
  border-color: var(--sage);
  background: var(--sage-soft);
  color: var(--navy);
  font-weight: 600;
}
.opt-ltr {
  min-width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--ivory-dark);
  color: var(--navy-mid);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.q-fb {
  margin-top: 10px;
  padding: 9px 12px;
  border-radius: 4px;
  font-size: 12px;
  line-height: 1.55;
  display: none;
}
.q-fb.correct { background: #D1FAE5; color: #065F46; border-left: 3px solid #10B981; }
.q-fb.wrong   { background: #FEE2E2; color: #7F1D1D; border-left: 3px solid #EF4444; }
.qz-btns { display: flex; gap: 10px; justify-content: center; margin: 24px 0 16px; flex-wrap: wrap; }
.qz-btn-check {
  background: var(--navy);
  color: var(--gold-light);
  border: none;
  padding: 11px 36px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.2s;
}
.qz-btn-check:hover { background: var(--navy-mid); }
.qz-btn-reset {
  background: transparent;
  color: var(--muted);
  border: 1px solid #D1C9B8;
  padding: 11px 26px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  border-radius: 3px;
  cursor: pointer;
}
.result-box { display: none; background: var(--navy); border-radius: 8px; padding: 28px; text-align: center; margin-bottom: 20px; }
.result-score { font-family: 'Playfair Display', serif; font-size: 52px; color: var(--gold); line-height: 1; }
.result-pct { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; margin: 4px 0 14px; }
.result-msg { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.7; max-width: 380px; margin: 0 auto; }

/* ══════════════════════════════════
   RANGKUMAN
══════════════════════════════════ */
.rang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.rang-item {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 12px 14px;
  position: relative;
  overflow: hidden;
}
.rang-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(to bottom, var(--gold), var(--sage));
}
.rang-head {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  color: var(--navy);
  font-weight: 700;
  margin-bottom: 5px;
  padding-left: 8px;
}
.rang-txt { font-size: 11.5px; color: var(--muted); line-height: 1.55; padding-left: 8px; }

/* HINT */
.hint {
  color: rgba(234,201,106,0.35);
  font-size: 11px;
  letter-spacing: 2px;
  text-align: center;
  margin-top: 14px;
  font-weight: 400;
}
</style>
</head>

{ num: 'Hal. ii', content: `
<div class="pg">

    <span class="pg-chap-label">Pembuka</span>
    <span class="pg-title">Kata Pengantar</span>
  </div>
  <div class="ayat">
    <div class="ayat-ar">وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً</div>
    <div class="ayat-tr">"Dan di antara tanda-tanda kekuasaan-Nya ialah Dia menciptakan untukmu pasangan-pasangan dari jenismu sendiri, supaya kamu cenderung dan merasa tenteram kepadanya, dan dijadikan-Nya di antaramu rasa kasih dan sayang."</div>

  <p class="txt">Buku ajar ini disusun untuk memenuhi kebutuhan pembelajaran Pendidikan Agama Islam bagi peserta didik SMA Kelas XI. Materi disajikan secara sistematis mencakup pengertian, dasar hukum, rukun dan syarat, etika pra-nikah, hak dan kewajiban pasangan, hingga konsep keluarga sakinah mawaddah warahmah.</p>
  <p class="txt">Semoga ebook ini bermanfaat dan menjadi bekal ilmu yang membawa kebaikan bagi setiap pembacanya dalam menyiapkan diri menuju kehidupan rumah tangga yang diridhai Allah SWT.</p>

/* 3 — BAB I: PENGERTIAN */
{ num: 'Hal. 1', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab I · Pengertian &amp; Hukum</span>
    <span class="pg-title">Pengertian Pernikahan</span>
  </div>
  <h3 class="h-section">A. Definisi Pernikahan</h3>
  <p class="txt">Pernikahan dalam bahasa Arab disebut <span class="term">nikah (نِكَاح)</span> atau <span class="term">zawaj (زَوَاج)</span>. Secara etimologi, nikah berarti "berkumpul" atau "bersatu." Secara terminologi syar'i, pernikahan adalah <strong>akad yang menghalalkan pergaulan antara laki-laki dan perempuan yang bukan mahram</strong>, serta menimbulkan hak dan kewajiban timbal balik di antara keduanya.</p>
  <p class="txt">Al-Qur'an menyebut pernikahan dengan istilah yang sangat agung, yaitu <span class="term">mitsaqan ghalidza (مِيثَاقًا غَلِيظًا)</span> — perjanjian yang kokoh dan berat. Istilah ini sama dengan yang digunakan untuk menggambarkan perjanjian Allah dengan para nabi-Nya.</p>
  <div class="ayat">
    <div class="ayat-ar">وَكَيْفَ تَأْخُذُونَهُ وَقَدْ أَفْضَىٰ بَعْضُكُمْ إِلَىٰ بَعْضٍ وَأَخَذْنَ مِنكُم مِّيثَاقًا غَلِيظًا</div>
    <div class="ayat-tr">"…padahal mereka telah bergaul satu sama lain, dan mereka (istri-istri) telah mengambil dari kamu perjanjian yang kuat."</div>
    <div class="ayat-src">QS. An-Nisa: 21</div>
  </div>
  <h3 class="h-section">B. Dimensi Pernikahan</h3>
  <div class="cards">
    <div class="card">
      <div class="card-badge">Ibadah</div>
      <div class="card-title">Dimensi Spiritual</div>
      <div class="card-txt">Pernikahan adalah bagian dari ibadah dan penyempurna separuh agama seseorang.</div>
    </div>
    <div class="card">
      <div class="card-badge">Sosial</div>
      <div class="card-title">Dimensi Kemasyarakatan</div>
      <div class="card-txt">Menyatukan dua keluarga, memperluas silaturahmi, dan membangun generasi yang berkualitas.</div>
    </div>
    <div class="card">
      <div class="card-badge">Hukum</div>
      <div class="card-title">Dimensi Yuridis</div>
      <div class="card-txt">Menciptakan hak dan kewajiban yang diatur secara rinci dalam syariat Islam.</div>
    </div>
  </div>
  <div class="hadis">
    <div class="hadis-txt">"Barangsiapa menikah, maka ia telah menyempurnakan separuh agamanya. Maka hendaklah ia bertakwa kepada Allah untuk separuh yang tersisa."</div>
    <div class="hadis-src">HR. Al-Baihaqi — dari Anas bin Malik RA</div>
  </div>
</div>
` },

/* 4 — BAB I: HUKUM */
{ num: 'Hal. 2', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab I · Pengertian &amp; Hukum</span>
    <span class="pg-title">Hukum Pernikahan</span>
  </div>
  <p class="txt">Hukum asal pernikahan menurut mayoritas ulama adalah <span class="term">sunnah muakkadah</span> (sunnah yang sangat dianjurkan). Namun hukum tersebut dapat berubah tergantung kondisi seseorang. Para ulama fiqih menetapkan lima hukum pernikahan:</p>
  <table class="def-table">
    <thead>
      <tr><th>Hukum</th><th>Kondisi</th><th>Keterangan</th></tr>
    </thead>
    <tbody>
      <tr><td><strong>Wajib</strong></td><td>Sangat khawatir jatuh ke zina jika tidak menikah, dan telah mampu</td><td>Menikah menjadi kewajiban untuk menjaga diri dari maksiat</td></tr>
      <tr><td><strong>Sunnah</strong></td><td>Memiliki hasrat dan kemampuan, tidak khawatir berbuat zina</td><td>Hukum asal pernikahan bagi kebanyakan orang</td></tr>
      <tr><td><strong>Mubah</strong></td><td>Tidak ada dorongan kuat, tidak ada alasan yang mewajibkan atau melarang</td><td>Menikah dan tidak menikah bernilai sama</td></tr>
      <tr><td><strong>Makruh</strong></td><td>Belum mampu memberi nafkah atau belum siap secara mental</td><td>Lebih baik menunda hingga siap</td></tr>
      <tr><td><strong>Haram</strong></td><td>Jelas-jelas berniat menyakiti, menzalimi, atau merugikan pasangan</td><td>Pernikahan dengan niat jahat tidak dibenarkan</td></tr>
    </tbody>
  </table>
  <h3 class="h-section">Dasar Hukum Kesunnahan Menikah</h3>
  <div class="hadis">
    <div class="hadis-txt">"Wahai para pemuda, barangsiapa di antara kalian yang mampu menikah, maka menikahlah. Karena menikah itu lebih dapat menundukkan pandangan dan lebih menjaga kemaluan. Dan barangsiapa yang tidak mampu, maka hendaklah ia berpuasa, karena puasa adalah penahannya."</div>
    <div class="hadis-src">HR. Bukhari &amp; Muslim — dari Abdullah bin Mas'ud RA</div>
  </div>
  <div class="hl">
    <div class="hl-title">Kata Kunci</div>
    <p class="txt" style="margin:0; font-size:13px; color:var(--muted);">
      <span class="term">Istitha'ah</span> = kemampuan (materi, fisik, mental) · <span class="term">Ghairah</span> = rasa cemburu/dorongan · <span class="term">Fitnah</span> = godaan/cobaan dalam konteks ini adalah dorongan hasrat
    </p>
  </div>
</div>
` },

/* 5 — BAB II: TUJUAN */
{ num: 'Hal. 3', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab II · Tujuan Pernikahan</span>
    <span class="pg-title">Tujuan Pernikahan dalam Islam</span>
  </div>
  <p class="txt">Islam menetapkan pernikahan dengan tujuan yang mulia dan komprehensif, bukan hanya memenuhi kebutuhan biologis semata. Tujuan-tujuan ini berkaitan erat dengan konsep <span class="term">maqashid al-syariah</span> (tujuan-tujuan syariat) dalam menjaga lima perkara pokok kehidupan manusia.</p>
  <h3 class="h-section">Lima Tujuan Utama Pernikahan</h3>
  <ul class="nlist">
    <li>
      <div class="nbadge">1</div>
      <div>
        <p class="txt"><strong>Menjaga Keturunan (Hifzun Nasl)</strong></p>
        <p class="txt">Memastikan kelangsungan generasi manusia dalam jalur yang halal, terhormat, dan jelas nasabnya. Islam sangat memperhatikan kejelasan nasab demi hak-hak anak.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">2</div>
      <div>
        <p class="txt"><strong>Meraih Ketenangan Jiwa (Sakinah)</strong></p>
        <p class="txt">Allah menciptakan pasangan agar manusia menemukan ketenangan, cinta (<em>mawaddah</em>), dan kasih sayang (<em>rahmah</em>) yang tulus dalam kehidupan bersama.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">3</div>
      <div>
        <p class="txt"><strong>Menjaga Kehormatan (Hifzul 'Irdh)</strong></p>
        <p class="txt">Menjauhkan diri dari perbuatan zina dan segala bentuk penyimpangan moral yang merusak martabat manusia dan tatanan masyarakat.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">4</div>
      <div>
        <p class="txt"><strong>Menyempurnakan Ibadah</strong></p>
        <p class="txt">Pernikahan menjadikan banyak aktivitas harian, mulai dari mencari nafkah, bersikap lembut kepada pasangan, hingga berhubungan suami istri, bernilai ibadah di sisi Allah SWT.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">5</div>
      <div>
        <p class="txt"><strong>Memperluas Silaturahmi</strong></p>
        <p class="txt">Menyambung tali persaudaraan antar keluarga, memperluas jaringan sosial, dan mempererat ukhuwah di tengah masyarakat Muslim.</p>
      </div>
    </li>
  </ul>
  <div class="hl">
    <div class="hl-title">🌿 Sakinah, Mawaddah, Warahmah</div>
    <p class="txt" style="font-size:13px; margin:0;">Ketiganya adalah anugerah yang Allah tanamkan dalam ikatan pernikahan: <strong>sakinah</strong> (ketenangan hati), <strong>mawaddah</strong> (cinta yang membara), dan <strong>rahmah</strong> (kasih sayang yang tulus dan berkelanjutan meski cinta memudar).</p>
  </div>
</div>
` },

/* 6 — BAB III: RUKUN */
{ num: 'Hal. 4', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab III · Rukun &amp; Syarat</span>
    <span class="pg-title">Rukun Nikah</span>
  </div>
  <p class="txt"><span class="term">Rukun</span> adalah unsur-unsur yang wajib ada agar pernikahan dinyatakan sah. Jika salah satu rukun tidak terpenuhi, pernikahan dianggap batal secara hukum Islam. Para ulama menetapkan <strong>lima rukun nikah</strong>:</p>
  <ul class="nlist">
    <li>
      <div class="nbadge">1</div>
      <div>
        <p class="txt"><strong>Calon Pengantin Pria (Mempelai Laki-laki)</strong></p>
        <p class="txt">Harus seorang Muslim, laki-laki sejati, bukan mahram dari calon istri, tidak dalam ihram haji/umrah, dan tidak terpaksa.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">2</div>
      <div>
        <p class="txt"><strong>Calon Pengantin Wanita (Mempelai Perempuan)</strong></p>
        <p class="txt">Harus seorang Muslimah (atau Ahli Kitab menurut sebagian ulama untuk nikah beda agama tertentu), perempuan sejati, bukan mahram, tidak dalam iddah, dan tidak terpaksa.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">3</div>
      <div>
        <p class="txt"><strong>Wali Nikah</strong></p>
        <p class="txt">Seorang laki-laki Muslim yang menjadi penanggung jawab akad nikah dari pihak mempelai wanita. Urutan wali nasab: ayah → kakek → saudara laki-laki → paman → dan seterusnya.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">4</div>
      <div>
        <p class="txt"><strong>Dua Orang Saksi</strong></p>
        <p class="txt">Dua orang laki-laki Muslim yang adil, baligh, berakal, merdeka (bukan budak), dan memahami isi akad yang sedang berlangsung. Saksi wajib hadir dan menyaksikan langsung.</p>
      </div>
    </li>
    <li>
      <div class="nbadge">5</div>
      <div>
        <p class="txt"><strong>Ijab dan Qabul (Sighat Akad)</strong></p>
        <p class="txt">Ijab adalah ucapan penyerahan dari wali, qabul adalah ucapan penerimaan dari pengantin pria. Keduanya harus dilakukan dalam satu majelis, bersambung (tidak terputus), jelas, dan diucapkan dengan bahasa yang dipahami.</p>
      </div>
    </li>
  </ul>
  <div class="hadis">
    <div class="hadis-txt">"Tidak sah nikah kecuali dengan wali dan dua saksi yang adil."</div>
    <div class="hadis-src">HR. Al-Baihaqi — dari 'Imran bin Husain RA</div>
  </div>
</div>
` },

/* 7 — BAB III: SYARAT */
{ num: 'Hal. 5', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab III · Rukun &amp; Syarat</span>
    <span class="pg-title">Syarat Sahnya Pernikahan</span>
  </div>
  <p class="txt"><span class="term">Syarat</span> adalah ketentuan yang harus dipenuhi pada masing-masing rukun agar pernikahan sah secara hukum Islam. Berbeda dengan rukun yang menyangkut keberadaan unsur, syarat menyangkut kualifikasi dari setiap rukun tersebut.</p>
  <h3 class="h-section">Syarat untuk Setiap Calon Mempelai</h3>
  <ul class="alist">
    <li><span class="abadge">a</span>Beragama Islam (pria wajib Muslim; wanita Muslim atau Ahli Kitab)</li>
    <li><span class="abadge">b</span>Bukan mahram (tidak ada hubungan yang mengharamkan pernikahan)</li>
    <li><span class="abadge">c</span>Tidak dalam keadaan ihram haji atau umrah</li>
    <li><span class="abadge">d</span>Atas kemauan sendiri (tidak dipaksa/diancam)</li>
    <li><span class="abadge">e</span>Jelas identitasnya (nama, jenis kelamin, dan sosoknya)</li>
    <li><span class="abadge">f</span>Untuk wanita: tidak dalam masa iddah dari pernikahan sebelumnya</li>
  </ul>
  <h3 class="h-section">Syarat untuk Wali Nikah</h3>
  <ul class="alist">
    <li><span class="abadge">a</span>Laki-laki, Muslim, baligh, dan berakal</li>
    <li><span class="abadge">b</span>Tidak fasik (memiliki integritas moral yang baik)</li>
    <li><span class="abadge">c</span>Tidak sedang ihram</li>
    <li><span class="abadge">d</span>Merdeka (bukan dalam perbudakan)</li>
  </ul>
  <h3 class="h-section">Syarat untuk Ijab Qabul</h3>
  <ul class="alist">
    <li><span class="abadge">a</span>Satu majelis — ijab dan qabul dilakukan dalam waktu dan tempat yang sama</li>

    <li><span class="abadge">c</span>Tidak bersyarat — misal "Aku nikahkan jika kamu lulus"</li>
    <li><span class="abadge">d</span>Tidak berbatas waktu — tidak ada ketentuan masa berlaku akad</li>
    <li><span class="abadge">e</span>Didengar oleh kedua saksi dengan jelas</li>

    <p class="txt" style="font-size:12.5px; margin:0;">Nikah siri adalah pernikahan yang memenuhi syarat dan rukun agama namun tidak tercatat secara resmi di KUA (Kantor Urusan Agama). Meskipun sah secara agama, nikah siri memiliki risiko hukum bagi istri dan anak dalam hal warisan, hak asuh, dan pengakuan negara.</p>
  </div>
</div>
` },

/* 8 — BAB IV: WALI */
{ num: 'Hal. 6', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab IV · Wali &amp; Mahar</span>
    <span class="pg-title">Wali Nikah</span>
  </div>
  <p class="txt">Wali nikah memegang peranan sangat penting dalam pernikahan Islam. Rasulullah ﷺ bersabda bahwa tidak sah pernikahan tanpa wali. Wali adalah orang yang berhak menikahkan seorang wanita.</p>
  <h3 class="h-section">Macam-macam Wali Nikah</h3>
  <div class="cards">
    <div class="card">
      <div class="card-badge">Utama</div>
      <div class="card-title">Wali Nasab</div>
      <div class="card-txt">Wali yang berasal dari jalur keturunan darah. Urutan prioritasnya: Ayah kandung → Kakek dari ayah → Saudara laki-laki kandung → Saudara laki-laki seayah → Anak laki-laki saudara kandung → Paman (saudara ayah) → Anak paman.</div>
    </div>
    <div class="card">
      <div class="card-badge">Pengganti</div>
      <div class="card-title">Wali Hakim</div>
      <div class="card-txt">Pejabat resmi (penghulu/KUA) yang bertindak sebagai wali ketika: tidak ada wali nasab, wali nasab adhal (menolak menikahkan tanpa alasan syar'i), atau wali nasab tidak diketahui keberadaannya.</div>
    </div>
    <div class="card">
      <div class="card-badge">Pelimpahan</div>
      <div class="card-title">Wali Muwakkil</div>
      <div class="card-txt">Wali yang mewakilkan haknya kepada orang lain yang dipercaya dan memenuhi syarat. Hal ini dibolehkan selama wali asli masih ada dan rela mewakilkan.</div>
    </div>
  </div>
  <h3 class="h-section">Wali Mujbir</h3>
  <p class="txt"><span class="term">Wali mujbir</span> adalah wali yang memiliki hak paksa untuk menikahkan — yaitu khusus <strong>ayah dan kakek</strong>. Namun para ulama kontemporer menekankan bahwa hak paksa ini hanya berlaku dalam kondisi tertentu dan tidak boleh mengorbankan kemaslahatan sang wanita. Dalam praktiknya, musyawarah dan persetujuan wanita sangat diutamakan.</p>
  <div class="hl">
    <div class="hl-title">Adhal — Wali yang Enggan Menikahkan</div>
    <p class="txt" style="font-size:12.5px; margin:0;">Jika wali nasab menolak menikahkan tanpa alasan yang dibenarkan syariat, sementara calon suami adalah orang yang layak (kafaah), maka hak perwalian dapat berpindah kepada wali hakim. Ini untuk melindungi hak wanita dari kezaliman.</p>
  </div>
</div>
` },

/* 9 — BAB IV: MAHAR */
{ num: 'Hal. 7', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab IV · Wali &amp; Mahar</span>
    <span class="pg-title">Mahar (Maskawin)</span>
  </div>
  <div class="ayat">
    <div class="ayat-ar">وَآتُوا النِّسَاءَ صَدُقَاتِهِنَّ نِحْلَةً</div>
    <div class="ayat-tr">"Berikanlah maskawin kepada wanita (yang kamu nikahi) sebagai pemberian yang penuh kerelaan."</div>
    <div class="ayat-src">QS. An-Nisa: 4</div>
  </div>
  <p class="txt"><span class="term">Mahar</span> adalah pemberian wajib dari pengantin pria kepada pengantin wanita, yang menjadi hak penuh milik istri. Mahar bukan harga seorang wanita, melainkan simbol kesungguhan dan penghormatan suami kepada istrinya.</p>
  <h3 class="h-section">Ketentuan Mahar</h3>
  <ul class="alist">
    <li><span class="abadge">1</span><strong>Wajib:</strong> Mahar adalah kewajiban yang tidak boleh diabaikan dalam pernikahan Islam.</li>
    <li><span class="abadge">2</span><strong>Hak Istri:</strong> Mahar sepenuhnya milik istri, tidak boleh diambil tanpa keridhaannya.</li>
    <li><span class="abadge">3</span><strong>Bentuknya Fleksibel:</strong> Boleh berupa uang, emas, barang berharga, hafalan Al-Qur'an, jasa mengajar, atau apa pun yang disepakati.</li>
    <li><span class="abadge">4</span><strong>Tidak Memberatkan:</strong> Rasulullah ﷺ menganjurkan mahar yang mudah dan tidak mempersulit.</li>
    <li><span class="abadge">5</span><strong>Tidak Ada Batas Minimum/Maksimum:</strong> Islam tidak menetapkan jumlah tertentu, meskipun ada perbedaan pendapat ulama mengenai batas minimal.</li>
  </ul>
  <h3 class="h-section">Jenis-jenis Pembayaran Mahar</h3>
  <table class="def-table">
    <thead><tr><th>Jenis</th><th>Penjelasan</th></tr></thead>
    <tbody>
      <tr><td><strong>Mahar Tunai</strong></td><td>Diserahkan seluruhnya saat akad nikah berlangsung.</td></tr>
      <tr><td><strong>Mahar Hutang</strong></td><td>Disepakati jumlahnya namun pembayarannya ditunda (dengan persetujuan istri).</td></tr>
      <tr><td><strong>Mahar Campuran</strong></td><td>Sebagian dibayar tunai saat akad, sebagian lagi ditangguhkan.</td></tr>
    </tbody>
  </table>
  <div class="hadis">
    <div class="hadis-txt">"Sebaik-baik mahar adalah yang paling mudah (tidak memberatkan)."</div>
    <div class="hadis-src">HR. Al-Hakim — dari 'Uqbah bin 'Amir RA</div>
  </div>
</div>
` },

/* 10 — BAB V: MAHRAM */
{ num: 'Hal. 8', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab V · Mahram</span>
    <span class="pg-title">Mahram &amp; Wanita yang Haram Dinikahi</span>
  </div>
  <p class="txt"><span class="term">Mahram</span> adalah orang-orang yang haram dinikahi karena adanya hubungan tertentu. Dalam Islam, ketentuan ini ditetapkan untuk menjaga kehormatan keluarga dan tatanan sosial masyarakat.</p>
  <h3 class="h-section">A. Haram Selamanya (Muabbad)</h3>
  <h4 class="h-sub">1. Sebab Nasab (Keturunan) — QS. An-Nisa: 23</h4>
  <ul class="alist">
    <li><span class="abadge">↑</span>Ibu kandung, nenek (ke atas)</li>
    <li><span class="abadge">↓</span>Anak perempuan kandung, cucu (ke bawah)</li>
    <li><span class="abadge">→</span>Saudara perempuan kandung, seayah, atau seibu</li>
    <li><span class="abadge">↗</span>Bibi dari pihak ayah (saudara perempuan ayah)</li>
    <li><span class="abadge">↗</span>Bibi dari pihak ibu (saudara perempuan ibu)</li>
    <li><span class="abadge">↘</span>Keponakan perempuan (anak dari saudara laki-laki maupun perempuan)</li>
  </ul>
  <h4 class="h-sub">2. Sebab Mushaharah (Pernikahan)</h4>
  <ul class="alist">
    <li><span class="abadge">a</span>Ibu mertua (ibu dari istri)</li>
    <li><span class="abadge">b</span>Anak tiri — jika pernikahan dengan ibunya telah dikonsumsi (dukhul)</li>
    <li><span class="abadge">c</span>Istri dari ayah (ibu tiri)</li>
    <li><span class="abadge">d</span>Istri dari anak kandung (menantu perempuan)</li>
  </ul>
  <h4 class="h-sub">3. Sebab Radha' (Persusuan)</h4>
  <p class="txt">Semua yang haram dinikahi karena nasab, berlaku pula bagi yang haram karena persusuan. Sabda Nabi: <em>"Haram karena persusuan apa yang haram karena nasab."</em> (HR. Bukhari)</p>
  <h3 class="h-section">B. Haram Sementara (Ghairu Muabbad)</h3>
  <ul class="alist">
    <li><span class="abadge">1</span>Wanita yang masih bersuami</li>
    <li><span class="abadge">2</span>Wanita dalam masa iddah</li>
    <li><span class="abadge">3</span>Wanita yang telah ditalak tiga (ba'in kubra) hingga menikah dengan pria lain secara sah</li>
    <li><span class="abadge">4</span>Saudari ipar — haram dikumpulkan dengan istrinya dalam satu pernikahan poligami</li>
    <li><span class="abadge">5</span>Menikahi lebih dari empat istri sekaligus</li>
  </ul>
</div>
` },

/* 11 — BAB VI: TA'ARUF & KHITBAH */
{ num: 'Hal. 9', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab VI · Proses Pra-Nikah</span>
    <span class="pg-title">Ta'aruf &amp; Khitbah</span>
  </div>
  <h3 class="h-section">A. Ta'aruf (التَّعَارُف)</h3>
  <p class="txt">Ta'aruf berasal dari kata <em>ta'aarafa</em> yang berarti saling mengenal. Dalam konteks pernikahan, ta'aruf adalah proses perkenalan antara calon pasangan yang dilakukan secara <strong>syar'i</strong> — menjaga dari khalwat (berduaan tanpa mahram), tidak berlebihan dalam interaksi, dan berorientasi serius pada pernikahan.</p>
  <p class="txt">Prinsip ta'aruf yang benar: melibatkan keluarga atau mahram sejak awal, memfokuskan pada pengenalan karakter dan nilai-nilai keagamaan, serta menghindari komunikasi yang berlebihan dan tidak perlu.</p>
  <h3 class="h-section">B. Khitbah / Peminangan</h3>
  <p class="txt"><span class="term">Khitbah</span> adalah pernyataan resmi keinginan seseorang untuk menikahi seorang wanita, disampaikan kepada wali atau kepada wanita tersebut. Khitbah bukan pernikahan, melainkan tahap menuju pernikahan.</p>
  <div class="cards">
    <div class="card">
      <div class="card-badge">Boleh</div>
      <div class="card-title">Melihat Calon</div>
      <div class="card-txt">Dibolehkan melihat wajah dan telapak tangan calon untuk membantu keputusan. Ini dilakukan sekali, bukan berkali-kali.</div>
    </div>
    <div class="card">
      <div class="card-badge">Larangan</div>
      <div class="card-title">Khitbah di Atas Khitbah</div>
      <div class="card-txt">Haram meminang wanita yang sudah dipinang orang lain dan penghitbah pertama belum melepaskan atau belum ditolak.</div>
    </div>
    <div class="card">
      <div class="card-badge">Status</div>
      <div class="card-title">Belum Halal</div>
      <div class="card-txt">Wanita yang sedang dipinang belum menjadi istri. Pergaulan bebas antara keduanya tetap haram hingga akad nikah dilangsungkan.</div>
    </div>
  </div>
  <div class="hl">
    <div class="hl-title">Ta'aruf vs. Pacaran</div>
    <p class="txt" style="font-size:12.5px; margin:0;"><strong>Ta'aruf:</strong> Niat jelas untuk menikah, ada mahram, ada batas interaksi, melibatkan keluarga, berorientasi pada akhlak dan agama. <strong>Pacaran:</strong> Tidak ada kepastian menikah, seringkali berduaan (khalwat), tanpa batas, berorientasi pada kesenangan sesaat. Islam tidak mengenal pacaran sebagai jalan menuju pernikahan.</p>
  </div>
</div>
` },

/* 12 — BAB VII: WALIMAH */
{ num: 'Hal. 10', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab VII · Walimatul Ursy</span>
    <span class="pg-title">Pesta Pernikahan dalam Islam</span>
  </div>
  <p class="txt"><span class="term">Walimatul Ursy</span> (وَلِيمَةُ الْعُرْسِ) adalah pesta pernikahan yang diadakan setelah akad nikah. Hukum menyelenggarakan walimah adalah <strong>sunnah muakkadah</strong> (sangat dianjurkan), bahkan sebagian ulama mewajibkannya.</p>
  <div class="hadis">
    <div class="hadis-txt">"Adakanlah walimah walau hanya dengan seekor kambing."</div>
    <div class="hadis-src">HR. Bukhari &amp; Muslim — dari Anas bin Malik RA</div>
  </div>
  <h3 class="h-section">Ketentuan Walimah</h3>
  <ul class="alist">
    <li><span class="abadge">1</span><strong>Waktu:</strong> Dianjurkan dalam 7 hari setelah akad nikah, idealnya hari pertama atau ketiga setelah akad.</li>
    <li><span class="abadge">2</span><strong>Tidak Berlebihan:</strong> Islam melarang pemborosan (israf) dan pamer kekayaan (tabdzir) dalam pesta pernikahan.</li>
    <li><span class="abadge">3</span><strong>Mengundang yang Membutuhkan:</strong> Dianjurkan mengundang orang fakir dan miskin, tidak hanya orang kaya.</li>
    <li><span class="abadge">4</span><strong>Bebas Kemungkaran:</strong> Tidak boleh ada hiburan yang melanggar syariat, minuman keras, campur baur yang tidak syar'i, atau hal yang diharamkan.</li>
  </ul>
  <h3 class="h-section">Hukum Menghadiri Undangan Walimah</h3>
  <p class="txt">Menghadiri undangan walimah nikah hukumnya <strong>wajib</strong> (fardu ain) menurut mayoritas ulama, dengan syarat: undangan sudah diterima, tidak ada uzur syar'i (sakit, perjalanan jauh), dan tidak ada kemungkaran di dalamnya.</p>
  <div class="hl">
    <div class="hl-title">Seputar Adat dalam Walimah</div>
    <p class="txt" style="font-size:12.5px; margin:0;">Adat istiadat daerah dalam pernikahan diperbolehkan selama tidak bertentangan dengan syariat Islam. Kaidah fikih menyebut: <em>"al-'adah muhakkamah"</em> — adat kebiasaan dapat dijadikan hukum, selama tidak melanggar nash Al-Qur'an dan Hadis.</p>
  </div>
  <h3 class="h-section">Kafaah (Kesetaraan)</h3>
  <p class="txt">Islam menganjurkan <span class="term">kafaah</span> (kesetaraan/kesepadanan) antara calon suami dan istri, terutama dalam hal agama dan akhlak. Tujuannya bukan untuk diskriminasi, melainkan untuk membangun rumah tangga yang harmonis dan terhindar dari konflik yang disebabkan perbedaan latar belakang yang terlalu jauh.</p>
</div>
` },

/* 13 — BAB VIII: HAK SUAMI */
{ num: 'Hal. 11', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab VIII · Hak &amp; Kewajiban</span>
    <span class="pg-title">Hak &amp; Kewajiban Suami</span>
  </div>
  <p class="txt">Islam mengatur hak dan kewajiban suami-istri secara adil dan berimbang. Al-Qur'an menyatakan: <em>"Dan para wanita mempunyai hak yang seimbang dengan kewajibannya menurut cara yang ma'ruf."</em> (QS. Al-Baqarah: 228)</p>
  <h3 class="h-section">Kewajiban Suami (= Hak Istri)</h3>
  <ul class="nlist">
    <li><div class="nbadge">1</div>
      <div>
        <p class="txt"><strong>Nafkah Lahir (Materi)</strong></p>
        <p class="txt">Suami wajib menyediakan kebutuhan pokok istri: makanan, pakaian, tempat tinggal yang layak, dan biaya kesehatan, sesuai kemampuannya.</p>
      </div>
    </li>
    <li><div class="nbadge">2</div>
      <div>
        <p class="txt"><strong>Nafkah Batin</strong></p>
        <p class="txt">Memenuhi kebutuhan psikologis dan hubungan suami-istri dengan cara yang baik dan tidak menyakiti.</p>
      </div>
    </li>
    <li><div class="nbadge">3</div>
      <div>
        <p class="txt"><strong>Mu'asyarah bil Ma'ruf (Pergaulan yang Baik)</strong></p>
        <p class="txt">Berlaku lembut, tidak berkata kasar, tidak menyakiti fisik maupun perasaan istri, dan menghargai pendapat istri.</p>
      </div>
    </li>
    <li><div class="nbadge">4</div>
      <div>
        <p class="txt"><strong>Bimbingan Agama</strong></p>
        <p class="txt">Menjadi imam shalat keluarga, memfasilitasi pendidikan agama istri dan anak, dan menjaga keluarga dari hal-hal yang diharamkan.</p>
      </div>
    </li>
    <li><div class="nbadge">5</div>
      <div>
        <p class="txt"><strong>Adil dalam Poligami</strong></p>
        <p class="txt">Jika berpoligami, wajib berlaku adil dalam nafkah, giliran bermalam, dan perlakuan lahiriah. Islam membolehkan poligami hingga empat istri dengan syarat mampu berlaku adil (QS. An-Nisa: 3).</p>
      </div>
    </li>
  </ul>
  <div class="ayat">
    <div class="ayat-ar">وَعَاشِرُوهُنَّ بِالْمَعْرُوفِ</div>
    <div class="ayat-tr">"Dan bergaullah dengan mereka (para istri) secara patut."</div>
    <div class="ayat-src">QS. An-Nisa: 19</div>
  </div>
</div>
` },

/* 14 — BAB VIII: HAK ISTRI */
{ num: 'Hal. 12', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab VIII · Hak &amp; Kewajiban</span>
    <span class="pg-title">Hak &amp; Kewajiban Istri</span>
  </div>
  <h3 class="h-section">Kewajiban Istri (= Hak Suami)</h3>
  <ul class="nlist">
    <li><div class="nbadge">1</div>
      <div>
        <p class="txt"><strong>Taat kepada Suami dalam Kebaikan</strong></p>
        <p class="txt">Istri wajib menaati suami dalam perkara yang tidak bertentangan dengan syariat. Ketaatan ini bukan ketundukan buta, melainkan bentuk ibadah yang disertai kesadaran penuh.</p>
      </div>
    </li>
    <li><div class="nbadge">2</div>
      <div>
        <p class="txt"><strong>Menjaga Kehormatan dan Amanah Suami</strong></p>
        <p class="txt">Menjaga kehormatan diri, harta, dan anak-anak saat suami tidak ada. Tidak mengizinkan orang yang tidak disukai suami masuk rumah.</p>
      </div>
    </li>
    <li><div class="nbadge">3</div>
      <div>
        <p class="txt"><strong>Mendidik dan Mengasuh Anak</strong></p>
        <p class="txt">Berperan aktif dalam tumbuh kembang fisik, mental, dan spiritual anak-anak. Ibu adalah madrasah pertama bagi anak-anaknya.</p>
      </div>
    </li>
    <li><div class="nbadge">4</div>
      <div>
        <p class="txt"><strong>Mengurus Rumah Tangga</strong></p>
        <p class="txt">Mengelola urusan rumah tangga dengan sebaik-baiknya, menjadikannya tempat yang nyaman dan kondusif bagi seluruh anggota keluarga.</p>
      </div>
    </li>
  </ul>
  <div class="hadis">
    <div class="hadis-txt">"Sebaik-baik wanita adalah yang menyenangkan suami jika ia memandangnya, taat kepada suami jika ia memerintahnya, dan tidak menyelisihi suami dalam hal yang dibenci suami tentang dirinya dan hartanya."</div>
    <div class="hadis-src">HR. An-Nasa'i — dari Abu Hurairah RA</div>
  </div>
  <div class="hl">
    <div class="hl-title">Nusyuz — Ketidaktaatan yang Dilarang</div>
    <p class="txt" style="font-size:12.5px; margin:0;"><span class="term">Nusyuz</span> adalah sikap ketidaktaatan istri kepada suami tanpa alasan yang dibenarkan syariat (atau sebaliknya, suami yang berlaku zalim kepada istri). Al-Qur'an memberi panduan mengatasi nusyuz istri secara bertahap: nasihat dengan lembut → pisah tempat tidur sementara → mediasi keluarga (QS. An-Nisa: 34-35).</p>
  </div>
</div>
` },

/* 15 — BAB IX: SAKINAH */
{ num: 'Hal. 13', content: `
<div class="pg">
  <div class="pg-header">
    <span class="pg-chap-label">Bab IX · Keluarga Sakinah</span>
    <span class="pg-title">Membangun Keluarga Sakinah Mawaddah Warahmah</span>
  </div>
  <p class="txt">Konsep <span class="term">Sakinah Mawaddah Warahmah</span> bersumber dari QS. Ar-Rum: 21. Ketiganya menggambarkan kualitas hubungan yang ideal dalam rumah tangga Islam dan merupakan anugerah dari Allah yang harus diperjuangkan bersama.</p>
  <div class="cards">
    <div class="card">
      <div class="card-badge">سَكِيْنَة</div>
      <div class="card-title">Sakinah</div>
      <div class="card-txt">Ketenangan dan kedamaian jiwa yang tumbuh dalam kehidupan bersama pasangan. Rumah adalah tempat berlindung dari kelelahan dunia.</div>
    </div>
    <div class="card">
      <div class="card-badge">مَوَدَّة</div>
      <div class="card-title">Mawaddah</div>
      <div class="card-txt">Cinta yang menggebu-gebu, hasrat, dan keinginan untuk selalu bersama. Cinta yang aktif, bukan pasif.</div>
    </div>
    <div class="card">
      <div class="card-badge">رَحْمَة</div>
      <div class="card-title">Warahmah</div>
      <div class="card-txt">Kasih sayang yang lembut, sabar, dan berkelanjutan. Rahmah justru menguat ketika mawaddah memudar seiring usia.</div>
    </div>
  </div>
  <h3 class="h-section">Pilar Keluarga Sakinah</h3>
  <ul class="nlist">
    <li><div class="nbadge">1</div><p class="txt"><strong>Pondasi Takwa:</strong> Pasangan yang menjalankan ibadah bersama (shalat berjamaah, tadarus, dll.) memiliki ikatan spiritual yang kuat dan ketahanan menghadapi ujian lebih baik.</p></li>
    <li><div class="nbadge">2</div><p class="txt"><strong>Komunikasi yang Baik:</strong> Bicara dengan jujur, mendengarkan dengan sabar, tidak memendam perasaan, dan menghindari kata-kata yang menyakiti hati.</p></li>
    <li><div class="nbadge">3</div><p class="txt"><strong>Musyawarah:</strong> Keputusan besar — keuangan, pendidikan anak, tempat tinggal — diambil bersama dengan penuh kasih sayang dan rasa hormat.</p></li>
    <li><div class="nbadge">4</div><p class="txt"><strong>Saling Memaafkan:</strong> Tidak ada manusia yang sempurna. Pasangan yang kuat adalah yang mampu memaafkan dengan tulus dan tidak mengungkit-ungkit kesalahan masa lalu.</p></li>
    <li><div class="nbadge">5</div><p class="txt"><strong>Menjaga Ibadah Bersama:</strong> Shalat, doa, dan zikir bersama mempererat hubungan vertikal (kepada Allah) dan horizontal (antara suami-istri).</p></li>
  </ul>
</div>

/* 16 — BAB X: TALAK & RUJUK */
{ num: 'Hal. 14', content: `
<div class="pg">

// ══════════════════════════════════════════════
//   FLIPBOOK ENGINE
// ══════════════════════════════════════════════
let curPage = 0;
let busy = false;
let userAns = {};

const flipper = document.getElementById('flipper');
const frontScroll = document.getElementById('frontScroll');
const backScroll  = document.getElementById('backScroll');
const frontNum    = document.getElementById('frontNum');
const backNum     = document.getElementById('backNum');
const total       = PAGES.length; // 21

function renderContent(idx) { return PAGES[idx] ? PAGES[idx].content : ''; }
function renderNum(idx)     { return PAGES[idx] ? PAGES[idx].num : ''; }

function updateUI() {
  document.getElementById('pgCounter').textContent = (curPage+1) + ' / ' + total;
  document.getElementById('btnPrev').disabled  = curPage === 0;
  document.getElementById('btnFirst').disabled = curPage === 0;
  document.getElementById('btnNext').disabled  = curPage === total-1;
  document.getElementById('btnLast').disabled  = curPage === total-1;
  const pct = ((curPage+1)/total*100).toFixed(2);
  document.getElementById('progressBar').style.width = pct + '%';
}

function injectQuizIfNeeded(scrollEl, pageIdx) {
  if (pageIdx === 18) {
    const c = scrollEl.querySelector('#qz-p1');
    if (c && !c.dataset.built) { c.innerHTML = buildQBlocks(0,4); c.dataset.built='1'; bindQ(0,4,c); }
  } else if (pageIdx === 19) {
    const c = scrollEl.querySelector('#qz-p2');
    if (c && !c.dataset.built) { c.innerHTML = buildQBlocks(5,9); c.dataset.built='1'; bindQ(5,9,c); }
  } else if (pageIdx === 20) {
    const c = scrollEl.querySelector('#qz-p3');
    if (c && !c.dataset.built) { c.innerHTML = buildQBlocks(10,14); c.dataset.built='1'; bindQ(10,14,c); }
  }
}

function loadPage(scrollEl, numEl, idx) {
  scrollEl.innerHTML = renderContent(idx);
  numEl.textContent  = renderNum(idx);
  scrollEl.scrollTop = 0;
  injectQuizIfNeeded(scrollEl, idx);
}

function flipTo(target) {
  if (busy || target === curPage || target < 0 || target >= total) return;
  busy = true;
  const fwd = target > curPage;

  if (fwd) {
    loadPage(backScroll, backNum, target);
    flipper.classList.add('flipped');
    setTimeout(() => {
      curPage = target;
      loadPage(frontScroll, frontNum, curPage);
      flipper.style.transition = 'none';
      flipper.classList.remove('flipped');
      setTimeout(() => { flipper.style.transition = ''; busy = false; updateUI(); }, 30);
    }, 720);
  } else {
    loadPage(frontScroll, frontNum, target);
    flipper.style.transition = 'none';
    flipper.classList.add('flipped');
    setTimeout(() => {
      flipper.style.transition = '';
      flipper.classList.remove('flipped');
      setTimeout(() => { curPage = target; busy = false; updateUI(); }, 720);
    }, 30);
  }
}

function next()  { flipTo(curPage + 1); }
function prev()  { flipTo(curPage - 1); }
function goTo(p) { flipTo(p); }

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') next();
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   prev();
  if (e.key==='Home') goTo(0);
  if (e.key==='End')  goTo(total-1);
});

// Init
loadPage(frontScroll, frontNum, 0);
updateUI();

// ══════════════════════════════════════════════
//   QUIZ LOGIC
// ══════════════════════════════════════════════
function buildQBlocks(from, to) {
  const letters = ['A','B','C','D'];
  let html = '';
  for (let i = from; i <= to; i++) {
    const q = QS[i];
    const opts = q.opts.map((o,j) => `
      <li>
        <input type="radio" name="q${i}" id="q${i}o${j}" value="${j}">
        <label for="q${i}o${j}">
          <span class="opt-ltr">${letters[j]}</span>
          <span>${o}</span>
        </label>
      </li>`).join('');
    html += `<div class="q-block" id="qb${i}">
      <div class="q-num">Soal ${i+1} dari ${QS.length}</div>
      <div class="q-text">${q.q}</div>
      <ul class="q-opts">${opts}</ul>
      <div class="q-fb" id="qf${i}"></div>
    </div>`;
  }
  return html;
}

function bindQ(from, to, container) {
  for (let i = from; i <= to; i++) {
    container.querySelectorAll(`input[name="q${i}"]`).forEach(r => {
      r.addEventListener('change', () => { userAns[i] = parseInt(r.value); });
    });
  }
}

function checkAll() {
  // Check if all answered
  const unanswered = [];
  for (let i = 0; i < QS.length; i++) {
    if (userAns[i] === undefined) unanswered.push(i+1);
  }
  if (unanswered.length > 0) {
    alert('Soal yang belum dijawab: ' + unanswered.join(', ') + '\nSilakan jawab semua soal terlebih dahulu.');
    return;
  }

  let score = 0;
  const letters = ['A','B','C','D'];

  for (let i = 0; i < QS.length; i++) {
    const q = QS[i];
    // Find feedback element across all quiz pages
    let fb = document.getElementById('qf'+i);
    if (!fb) continue;
    fb.style.display = 'block';
    if (userAns[i] === q.ans) {
      score++;
      fb.className = 'q-fb correct';
      fb.innerHTML = '✅ <strong>Benar!</strong> ' + q.explain;
    } else {
      fb.className = 'q-fb wrong';
      fb.innerHTML = '❌ <strong>Kurang tepat.</strong> Jawaban benar: <strong>' + letters[q.ans] + '. ' + q.opts[q.ans] + '</strong>. ' + q.explain;
    }
  }

  const pct = Math.round(score/QS.length*100);
  const msg = pct>=90 ? 'MasyaAllah! Nilaimu sangat memuaskan. Pertahankan! 🌟'
    : pct>=80 ? 'Bagus sekali! Kamu memahami materi dengan baik. 👍'
    : pct>=70 ? 'Cukup baik. Pelajari kembali soal yang belum tepat. 📖'
    : pct>=60 ? 'Lumayan, namun masih perlu banyak berlatih lagi. 💪'
    : 'Jangan menyerah! Baca kembali materi dari awal dan coba lagi. 🔄';

  const rb = document.getElementById('result-box');
  if (rb) {
    rb.style.display = 'block';
    rb.innerHTML = `<div class="result-score">${score}/${QS.length}</div><div class="result-pct">Nilai · ${pct}%</div><div class="result-msg">${msg}</div>`;
    rb.scrollIntoView({behavior:'smooth', block:'center'});
  }
  const bc = document.getElementById('btn-check');
  if (bc) bc.style.display = 'none';
}

function resetAll() {
  userAns = {};
  // Re-render quiz pages
  [18,19,20].forEach(pi => {
    if (pi === curPage) {
      // re-load current page
      loadPage(frontScroll, frontNum, pi);
    }
  });
  // Show btn-check again if on page 20
  const bc = document.getElementById('btn-check');
  if (bc) bc.style.display = 'inline-block';
  const rb = document.getElementById('result-box');
  if (rb) rb.style.display = 'none';
}
</script>
</body>
</html>
